<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="card bg-black p-4 border border-[#A3A3A1]/50 rounded">
    <h2 class="text-xl font-bold mb-4 text-[#09395F]">Environmental History</h2>
    <div class="flex gap-2 mb-4">
        <button onclick="loadGraph(1)" class="text-xs bg-[#A3A3A1] text-black px-2 py-1 rounded">1 Hour</button>
        <button onclick="loadGraph(24)" class="text-xs bg-[#A3A3A1] text-black px-2 py-1 rounded">24 Hours</button>
        <button onclick="loadGraph(168)" class="text-xs bg-[#A3A3A1] text-black px-2 py-1 rounded">7 Days</button>
    </div>
    <canvas id="envChart" height="100"></canvas>
</div>

<script>
let envChart;

async function loadGraph(hours) {
    const response = await fetch(`/api/history?hours=${hours}`);
    const data = await response.json();

    const ctx = document.getElementById('envChart').getContext('2d');
    
    if (envChart) {
        envChart.destroy();
    }

    envChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.labels,
            datasets: [
                {
                    label: 'Internal Humidity (%)',
                    data: data.hum_1,
                    borderColor: '#35AB57',
                    tension: 0.1,
                    pointRadius: 0
                },
                {
                    label: 'External Humidity (%)',
                    data: data.hum_2,
                    borderColor: '#E72A2E',
                    tension: 0.1,
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: false, grid: { color: '#333' } },
                x: { grid: { color: '#333' } }
            },
            plugins: { legend: { labels: { color: '#FFF' } } }
        }
    });
}

// Load default 24h graph on boot
document.addEventListener("DOMContentLoaded", () => loadGraph(24));
</script>
