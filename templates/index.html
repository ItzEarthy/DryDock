{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 space-y-6">
        <div hx-get="/partials/latest" hx-trigger="every 2s" hx-swap="innerHTML">
            {% include 'partials/latest.html' %} 
        </div>
        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-[#09395F] border-b border-[#A3A3A1]/30 pb-2">Environmental History</h2>
            <div class="flex gap-2 mb-4">
                <button onclick="loadGraph(1)" class="text-xs bg-[#A3A3A1] text-black px-3 py-1 rounded font-bold">1 Hour</button>
                <button onclick="loadGraph(24)" class="text-xs bg-[#A3A3A1] text-black px-3 py-1 rounded font-bold">24 Hours</button>
                <button onclick="loadGraph(168)" class="text-xs bg-[#A3A3A1] text-black px-3 py-1 rounded font-bold">7 Days</button>
            </div>
            <canvas id="envChart" height="100"></canvas>
        </div>
    </div>
    <div class="space-y-6">
        <div class="card">
            <h2 class="text-xl font-bold mb-4 text-[#09395F] border-b border-[#A3A3A1]/30 pb-2">Spoolman Workflow</h2>
            <form hx-post="/spoolman/sync" hx-target="#sync-result" class="space-y-4">
                <div>
                    <label class="block text-xs text-[#A3A3A1] mb-1">Spoolman ID</label>
                    <input type="number" name="spoolman_id" class="input-dark" required>
                </div>
                <div>
                    <label class="block text-xs text-[#A3A3A1] mb-1">RFID UID</label>
                    <input type="text" name="rfid_uid" value="{{ latest_uid }}" class="input-dark" readonly>
                </div>
                <div>
                    <label class="block text-xs text-[#A3A3A1] mb-1">Current Weight (g)</label>
                    <input type="number" name="weight" value="{{ '%.0f'|format(weight_grams) if weight_grams != None else '0' }}" class="input-dark" readonly>
                </div>
                <button type="submit" class="btn-blue w-full uppercase">Update Spool</button>
            </form>
            <div id="sync-result" class="mt-2"></div>
        </div>
        <div class="card space-y-3">
            <h2 class="text-xl font-bold mb-2 text-[#09395F] border-b border-[#A3A3A1]/30 pb-2">System Health</h2>
            <div class="flex justify-between text-sm pb-2 mt-3">
                <span class="text-[#A3A3A1]">DryDock ESP32</span>
                <span class="font-bold flex items-center gap-2"><span class="dot {% if sensor_status.ok %}dot-g{% else %}dot-r{% endif %}"></span>{{ sensor_status.msg }}</span>
            </div>
            <div class="flex justify-between text-sm pb-2">
                <span class="text-[#A3A3A1]">Spoolman API</span>
                <span class="font-bold flex items-center gap-2"><span class="dot {% if spoolman_status.ok %}dot-g{% else %}dot-r{% endif %}"></span>{{ spoolman_status.msg }}</span>
            </div>
        </div>
    </div>
</div>
<script>
let envChart;
async function loadGraph(hrs) {
    const res = await fetch(`/api/history?hours=${hrs}`);
    const data = await res.json();
    if(envChart) envChart.destroy();
    envChart = new Chart(document.getElementById('envChart').getContext('2d'), {
        type: 'line', data: { labels: data.labels, datasets: [
            { label: 'Internal Hum %', data: data.hum_1, borderColor: '#35AB57', tension: 0.1, pointRadius: 0 },
            { label: 'External Hum %', data: data.hum_2, borderColor: '#E72A2E', tension: 0.1, pointRadius: 0 }
        ]}, options: { responsive: true, scales: { y: { grid: { color: '#333' } }, x: { grid: { color: '#333' } } } }
    });
}
document.addEventListener("DOMContentLoaded", () => loadGraph(24));
</script>
{% endblock %}
