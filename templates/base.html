<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DryDock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/drydock.css') }}">
</head>
<body{% if active_theme == 'light' %} data-theme="light"{% endif %} class="p-4 md:p-6 max-w-7xl mx-auto space-y-6">
    <header class="border-b pb-4 mb-6 flex flex-col gap-4 md:flex-row md:justify-between md:items-center border-edge">
        <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-full border-2 overflow-hidden border-edge bg-accent-gradient">
                <img src="{{ url_for('static', filename='Dry_dock.svg') }}" alt="DryDock logo" onerror="this.style.display='none'">
            </div>
            <div>
                <h1 class="text-3xl font-bold uppercase">DryDock</h1>
                <p class="soft-text text-sm">ESP32-S3 Filament Inventory Monitor</p>
            </div>
        </div>
        <div class="flex items-center gap-3 flex-wrap justify-center md:justify-end w-full md:w-auto">
            <nav class="flex flex-wrap justify-center gap-2 md:gap-4">
            <a href="/" class="nav-link {% if request.path == '/' %}nav-active{% endif %}">Dashboard</a>
            <a href="/filaments" class="nav-link {% if request.path.startswith('/filaments') %}nav-active{% endif %}">Filament Management</a>
            <a href="/settings_page" class="nav-link {% if request.path == '/settings_page' %}nav-active{% endif %}">Settings</a>
            <a href="/logout" class="nav-link text-danger">Logout</a>
            </nav>
            <div class="flex items-center gap-2 ml-4 text-sm">
                <span id="nav-health-esp32" title="ESP32 status"><span class="dot dot-r"></span></span>
                <span id="nav-health-spoolman" title="Spoolman status"><span class="dot dot-r"></span></span>
                <span id="nav-health-db" title="Database status"><span class="dot dot-r"></span></span>
            </div>
        </div>
    </header>
    <main>{% block content %}{% endblock %}</main>

    <div id="modal-root" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm p-4 md:p-10 overflow-y-auto"></div>

    <script>
    function closeModal() {
        const root = document.getElementById("modal-root");
        if (!root) return;
        root.classList.add("hidden");
        root.innerHTML = "";
    }

    document.body.addEventListener("htmx:afterSwap", function (evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === "modal-root") {
            evt.detail.target.classList.remove("hidden");
        }
    });

    document.addEventListener("keydown", function (evt) {
        if (evt.key === "Escape") {
            closeModal();
        }
    });

    function setCollapseState(panelId, isOpen) {
        const key = `drydock-collapse-${panelId}`;
        localStorage.setItem(key, isOpen ? "open" : "closed");
    }

    function getCollapseState(panelId) {
        const key = `drydock-collapse-${panelId}`;
        return localStorage.getItem(key);
    }

    function togglePanel(panelId, btn) {
        const panel = document.getElementById(panelId);
        if (!panel) return;
        const willOpen = panel.classList.contains("hidden");
        panel.classList.toggle("hidden", !willOpen);
        if (btn) {
            btn.title = willOpen ? "Collapse" : "Expand";
            const icon = btn.querySelector("svg");
            if (icon) {
                if (willOpen) {
                    icon.classList.remove("rotate-180");
                } else {
                    icon.classList.add("rotate-180");
                }
            }
        }
        setCollapseState(panelId, willOpen);
    }

    function initializeCollapsibles(root = document) {
        root.querySelectorAll("[data-collapse-target]").forEach((btn) => {
            const panelId = btn.getAttribute("data-collapse-target");
            const panel = document.getElementById(panelId);
            if (!panel) return;

            const state = getCollapseState(panelId);
            const icon = btn.querySelector("svg");

            if (state === "closed") {
                panel.classList.add("hidden");
                btn.title = "Expand";
                if (icon) icon.classList.add("rotate-180");
            } else {
                panel.classList.remove("hidden");
                btn.title = "Collapse";
                if (icon) icon.classList.remove("rotate-180");
            }

            if (!btn.dataset.collapseBound) {
                btn.addEventListener("click", () => togglePanel(panelId, btn));
                btn.dataset.collapseBound = "1";
            }
        });
    }

    document.addEventListener("DOMContentLoaded", () => initializeCollapsibles(document));
    document.body.addEventListener("htmx:afterSwap", (evt) => initializeCollapsibles(evt.detail.target || document));

    // Set CSS progress widths from data attributes to avoid inline visual styles.
    function setProgressFromData(root = document) {
        root.querySelectorAll('.progress-fill').forEach((el) => {
            const dp = el.getAttribute('data-progress');
            if (!dp) return;
            // Accept either number or percent string.
            const val = String(dp).trim();
            if (val.endsWith('%')) {
                el.style.setProperty('--progress', val);
            } else if (!isNaN(Number(val))) {
                el.style.setProperty('--progress', val + '%');
            } else {
                el.style.setProperty('--progress', val);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => setProgressFromData(document));
    document.body.addEventListener('htmx:afterSwap', (evt) => setProgressFromData(evt.detail.target || document));
    </script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="{{ url_for('static', filename='js/update_popup.js') }}"></script>
    <script>
    (function navbarHealth(){
        async function refresh(){
            try{
                const res = await fetch('/api/system/health?t=' + Date.now());
                if (!res.ok) return;
                const j = await res.json();
                const map = [ ['esp32','nav-health-esp32'], ['spoolman','nav-health-spoolman'], ['database','nav-health-db'] ];
                map.forEach(([key, id])=>{
                    try{
                        const el = document.getElementById(id);
                        if (!el) return;
                        const payload = j[key] || {};
                        const ok = payload.ok === undefined ? (key === 'esp32' ? (j.esp32 && j.esp32.ok) : payload.ok) : payload.ok;
                        el.innerHTML = `<span class="dot ${ok ? 'dot-g' : 'dot-r'}"></span>`;
                        el.title = payload.msg || '';
                    }catch(e){}
                });
            }catch(e){}
        }
        refresh();
        setInterval(refresh, 8000);
    })();
    </script>
</body>
</html>
