<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DryDock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        :root {
            --accent: #0f6a57;
            --accent-2: #1b9aaa;
            --danger: #db3a34;
            --ok: #3cb371;
            --edge: rgba(132, 148, 158, 0.35);
            --chart-grid: rgba(132, 148, 158, 0.25);
        }
        .theme-dark {
            --bg: #0b1118;
            --bg-soft: #151f2b;
            --card: rgba(14, 23, 33, 0.84);
            --text: #e8eff7;
            --muted: #a9b8c7;
        }
        .theme-light {
            --bg: #f2f6f9;
            --bg-soft: #e3edf3;
            --card: rgba(255, 255, 255, 0.88);
            --text: #0f2436;
            --muted: #587189;
            --edge: rgba(88, 113, 137, 0.28);
            --chart-grid: rgba(88, 113, 137, 0.2);
        }
        body {
            font-family: "Space Grotesk", sans-serif;
            background:
                radial-gradient(circle at 14% 5%, rgba(15, 106, 87, 0.24), transparent 42%),
                radial-gradient(circle at 92% 94%, rgba(27, 154, 170, 0.22), transparent 38%),
                linear-gradient(145deg, var(--bg), var(--bg-soft));
            color: var(--text);
            min-height: 100vh;
        }
        .mono {
            font-family: "IBM Plex Mono", monospace;
        }
        .input-dark {
            background: color-mix(in srgb, var(--card) 84%, #000 16%);
            border: 1px solid var(--edge);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 0.5rem;
            width: 100%;
        }
        .btn-blue {
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            color: #f8fffb;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-gray {
            background: color-mix(in srgb, var(--muted) 40%, transparent);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-outline {
            border: 1px solid var(--edge);
            color: var(--text);
            padding: 0.45rem 0.9rem;
            border-radius: 0.5rem;
        }
        .card {
            border: 1px solid var(--edge);
            padding: 1.25rem;
            border-radius: 0.85rem;
            background: var(--card);
            backdrop-filter: blur(4px);
        }
        .nav-link {
            color: var(--text);
            font-weight: 700;
            padding: 0.5rem 0.85rem;
            border-radius: 0.45rem;
        }
        .nav-link:hover,
        .nav-active { background: color-mix(in srgb, var(--accent) 58%, transparent); }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-g { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
        .dot-r { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .chip {
            border: 1px solid var(--edge);
            border-radius: 999px;
            font-size: 0.72rem;
            padding: 0.1rem 0.6rem;
            color: var(--muted);
        }
        .section-title {
            color: var(--text);
            border-bottom: 1px solid var(--edge);
            padding-bottom: 0.5rem;
        }
        .soft-text { color: var(--muted); }
    </style>
</head>
<body class="{{ 'theme-light' if active_theme == 'light' else 'theme-dark' }} p-4 md:p-6 max-w-7xl mx-auto space-y-6">
    <header class="border-b pb-4 mb-6 flex flex-col gap-4 md:flex-row md:justify-between md:items-center" style="border-color: var(--edge);">
        <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-full border-2 overflow-hidden" style="border-color: var(--edge); background: linear-gradient(130deg, var(--accent), var(--accent-2));">
                <img src="/static/logo.png" onerror="this.style.display='none'">
            </div>
            <div>
                <h1 class="text-3xl font-bold uppercase">DryDock</h1>
                <p class="soft-text text-sm">ESP32-S3 Filament Inventory Monitor</p>
            </div>
        </div>
        <div class="flex items-center gap-3 flex-wrap justify-end">
            {% if current_user %}
            <span class="chip uppercase">{{ current_user.role }}</span>
            {% endif %}
            <nav class="flex gap-2">
            <a href="/" class="nav-link {% if request.path == '/' %}nav-active{% endif %}">Dashboard</a>
            <a href="/settings_page" class="nav-link {% if request.path == '/settings_page' %}nav-active{% endif %}">Settings</a>
            <a href="/logout" class="nav-link" style="color: var(--danger);">Logout</a>
            </nav>
        </div>
    </header>
    <main>{% block content %}{% endblock %}</main>

    <div id="modal-root" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm p-4 md:p-10 overflow-y-auto"></div>

    <script>
    function closeModal() {
        const root = document.getElementById("modal-root");
        if (!root) return;
        root.classList.add("hidden");
        root.innerHTML = "";
    }

    document.body.addEventListener("htmx:afterSwap", function (evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === "modal-root") {
            evt.detail.target.classList.remove("hidden");
        }
    });

    document.addEventListener("keydown", function (evt) {
        if (evt.key === "Escape") {
            closeModal();
        }
    });

    function setCollapseState(panelId, isOpen) {
        const key = `drydock-collapse-${panelId}`;
        localStorage.setItem(key, isOpen ? "open" : "closed");
    }

    function getCollapseState(panelId) {
        const key = `drydock-collapse-${panelId}`;
        return localStorage.getItem(key);
    }

    function togglePanel(panelId, btn) {
        const panel = document.getElementById(panelId);
        if (!panel) return;
        const willOpen = panel.classList.contains("hidden");
        panel.classList.toggle("hidden", !willOpen);
        if (btn) {
            btn.textContent = willOpen ? "Collapse" : "Expand";
        }
        setCollapseState(panelId, willOpen);
    }

    function initializeCollapsibles(root = document) {
        root.querySelectorAll("[data-collapse-target]").forEach((btn) => {
            const panelId = btn.getAttribute("data-collapse-target");
            const panel = document.getElementById(panelId);
            if (!panel) return;

            const state = getCollapseState(panelId);
            if (state === "closed") {
                panel.classList.add("hidden");
                btn.textContent = "Expand";
            } else {
                panel.classList.remove("hidden");
                btn.textContent = "Collapse";
            }

            if (!btn.dataset.collapseBound) {
                btn.addEventListener("click", () => togglePanel(panelId, btn));
                btn.dataset.collapseBound = "1";
            }
        });
    }

    document.addEventListener("DOMContentLoaded", () => initializeCollapsibles(document));
    document.body.addEventListener("htmx:afterSwap", (evt) => initializeCollapsibles(evt.detail.target || document));
    </script>
</body>
</html>
