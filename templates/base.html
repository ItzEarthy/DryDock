<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DryDock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/drydock.css') }}">
</head>
<body{% if active_theme == 'light' %} data-theme="light"{% endif %} class="p-4 md:p-6 max-w-7xl mx-auto space-y-6">
    <header class="border-b pb-4 mb-6 flex flex-col gap-4 md:flex-row md:justify-between md:items-center border-edge">
        <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-full border-2 overflow-hidden border-edge bg-accent-gradient">
                <img src="/static/logo.png" onerror="this.style.display='none'">
            </div>
            <div>
                <h1 class="text-3xl font-bold uppercase">DryDock</h1>
                <p class="soft-text text-sm">ESP32-S3 Filament Inventory Monitor</p>
            </div>
        </div>
        <div class="flex items-center gap-3 flex-wrap justify-end">
            <nav class="flex gap-2">
            <a href="/" class="nav-link {% if request.path == '/' %}nav-active{% endif %}">Dashboard</a>
            <a href="/filaments" class="nav-link {% if request.path.startswith('/filaments') %}nav-active{% endif %}">Filament Management</a>
            <a href="/settings_page" class="nav-link {% if request.path == '/settings_page' %}nav-active{% endif %}">Settings</a>
            <a href="/logout" class="nav-link text-danger">Logout</a>
            </nav>
        </div>
    </header>
    <main>{% block content %}{% endblock %}</main>

    <div id="modal-root" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm p-4 md:p-10 overflow-y-auto"></div>

    <script>
    function closeModal() {
        const root = document.getElementById("modal-root");
        if (!root) return;
        root.classList.add("hidden");
        root.innerHTML = "";
    }

    document.body.addEventListener("htmx:afterSwap", function (evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === "modal-root") {
            evt.detail.target.classList.remove("hidden");
        }
    });

    document.addEventListener("keydown", function (evt) {
        if (evt.key === "Escape") {
            closeModal();
        }
    });

    function setCollapseState(panelId, isOpen) {
        const key = `drydock-collapse-${panelId}`;
        localStorage.setItem(key, isOpen ? "open" : "closed");
    }

    function getCollapseState(panelId) {
        const key = `drydock-collapse-${panelId}`;
        return localStorage.getItem(key);
    }

    function togglePanel(panelId, btn) {
        const panel = document.getElementById(panelId);
        if (!panel) return;
        const willOpen = panel.classList.contains("hidden");
        panel.classList.toggle("hidden", !willOpen);
        if (btn) {
            btn.textContent = willOpen ? "Collapse" : "Expand";
        }
        setCollapseState(panelId, willOpen);
    }

    function initializeCollapsibles(root = document) {
        root.querySelectorAll("[data-collapse-target]").forEach((btn) => {
            const panelId = btn.getAttribute("data-collapse-target");
            const panel = document.getElementById(panelId);
            if (!panel) return;

            const state = getCollapseState(panelId);
            if (state === "closed") {
                panel.classList.add("hidden");
                btn.textContent = "Expand";
            } else {
                panel.classList.remove("hidden");
                btn.textContent = "Collapse";
            }

            if (!btn.dataset.collapseBound) {
                btn.addEventListener("click", () => togglePanel(panelId, btn));
                btn.dataset.collapseBound = "1";
            }
        });
    }

    document.addEventListener("DOMContentLoaded", () => initializeCollapsibles(document));
    document.body.addEventListener("htmx:afterSwap", (evt) => initializeCollapsibles(evt.detail.target || document));

    // Set CSS progress widths from data attributes to avoid inline visual styles.
    function setProgressFromData(root = document) {
        root.querySelectorAll('.progress-fill').forEach((el) => {
            const dp = el.getAttribute('data-progress');
            if (!dp) return;
            // Accept either number or percent string.
            const val = String(dp).trim();
            if (val.endsWith('%')) {
                el.style.setProperty('--progress', val);
            } else if (!isNaN(Number(val))) {
                el.style.setProperty('--progress', val + '%');
            } else {
                el.style.setProperty('--progress', val);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => setProgressFromData(document));
    document.body.addEventListener('htmx:afterSwap', (evt) => setProgressFromData(evt.detail.target || document));
    </script>
</body>
</html>
