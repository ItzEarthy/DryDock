<h2 class="text-2xl font-bold mb-4 text-[#09395F] border-b border-[#A3A3A1]/30 pb-2">Scale Calibration</h2>
<div class="space-y-6">
    <div class="p-4 border border-[#A3A3A1]/50 rounded bg-black">
        <p class="text-sm text-white mb-1 font-bold">1. Tare Scale</p>
        <p class="text-xs text-[#A3A3A1] mb-3">Remove all weight.</p>
        <button hx-post="/calibration/tare" hx-target="#calibration-card" class="btn-gray w-full uppercase">Zero Scale</button>
        <div class="flex justify-between mt-2 text-xs font-mono"><span class="text-[#A3A3A1]">Offset:</span><span>{{ "%.0f"|format(cal_settings.tare_offset) }}</span></div>
    </div>
    <div class="p-4 border border-[#A3A3A1]/50 rounded bg-black">
        <p class="text-sm text-white mb-1 font-bold">2. Set Multiplier</p>
        <p class="text-xs text-[#A3A3A1] mb-3">Place a known weight (e.g., 500g).</p>
        <form hx-post="/calibration/multiplier" hx-target="#calibration-card" class="flex gap-2">
            <input type="number" step="any" name="known_weight" placeholder="Grams" class="input-dark flex-1" required>
            <button type="submit" class="btn-blue uppercase">Set</button>
        </form>
        <div class="flex justify-between mt-2 text-xs font-mono"><span class="text-[#A3A3A1]">Multiplier:</span><span>{{ "%.6f"|format(cal_settings.calibration_multiplier) }}</span></div>
    </div>
</div>
