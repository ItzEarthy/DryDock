<div class="space-y-3">
    <div class="flex justify-between text-xs">
        <span class="soft-text uppercase">Hardening progress</span>
        <span class="mono">{{ stability.progress }}%</span>
    </div>
    <div class="w-full h-3 rounded bg-black/20 overflow-hidden">
        <div class="h-full" style="width: {{ stability.progress }}%; background: linear-gradient(90deg, var(--accent), var(--accent-2));"></div>
    </div>
    <div class="text-sm">
        <span class="soft-text">Stable weight:</span>
        <span class="mono">{{ "%.2f"|format(stability.stable_weight) if stability.stable_weight is not none else "--" }} g</span>
    </div>

    {% if stability.stable %}
    <button class="btn-blue w-full uppercase" hx-get="/wizard/step/confirm" hx-target="#wizard-body" hx-swap="innerHTML">Continue to Confirm</button>
    {% else %}
    <button class="btn-outline w-full uppercase" disabled>Waiting for Stability...</button>
    {% endif %}
</div>
