<div class="space-y-4">
    <div class="p-3 border rounded border-edge">
        <div class="font-semibold mb-1">Step 4: Confirm + Sync</div>
        <p class="text-sm soft-text">Review values and sync to Spoolman.</p>
    </div>

    <form hx-post="/filaments/wizard/step/accept" hx-target="#wizard-result" hx-swap="innerHTML" class="space-y-3">
        <div>
            <label class="block text-xs soft-text mb-1">Spool to Update</label>
            <select name="spoolman_id" class="input-dark" required>
                <option value="">Select spool</option>
                {% for spool in spoolman_spools %}
                    {% set spool_id = spool.id if spool.id is defined else (spool.spool_id if spool.spool_id is defined else '') %}
                    {% set filament = spool.filament if spool.filament is defined else None %}
                    {% set label = spool.name if spool.name is defined and spool.name else (filament.name if filament and filament.name is defined else 'Unknown Spool') %}
                    <option value="{{ spool_id }}" {% if selected_spool_id is defined and selected_spool_id and (spool_id ~ '') == selected_spool_id %}selected{% endif %}>[ID {{ spool_id }}] {{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
                <label class="block text-xs soft-text mb-1">RFID UID</label>
                <input name="rfid_uid" class="input-dark mono" value="{{ latest_uid }}" data-live-rfid-input required>
            </div>
            <div>
                <label class="block text-xs soft-text mb-1">Weight (g)</label>
                <input name="weight" class="input-dark mono" value="{{ "%.2f"|format(selected_weight if selected_weight is not none else 0) }}" required>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <button type="submit" class="btn-blue uppercase text-sm">Accept</button>
            <button type="button" class="btn-outline uppercase text-sm" hx-get="/filaments/wizard/step/harden" hx-target="#wizard-body" hx-swap="innerHTML">Re-weigh</button>
            <button type="button" class="btn-outline uppercase text-sm" onclick="closeModal()">Cancel</button>
        </div>
    </form>
</div>
