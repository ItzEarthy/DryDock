<div class="space-y-4">
    <div class="p-3 border rounded" style="border-color: var(--edge);">
        <div class="font-semibold mb-1">Step 1: Clear Scale and Scan RFID</div>
        <p class="text-sm soft-text">Remove spool from scale, run tare, and scan RFID.</p>
    </div>

    {% if wizard_message %}
    <div class="p-2 rounded text-sm border {% if wizard_error %}border-red-500 text-red-400{% else %}border-green-500 text-green-400{% endif %}">{{ wizard_message }}</div>
    {% endif %}

    <div class="flex justify-between items-center text-sm">
        <span class="soft-text">Latest RFID:</span>
        <span class="mono" data-live-rfid>{{ latest_uid or 'Awaiting scan' }}</span>
    </div>

    <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="p-2 border rounded" style="border-color: var(--edge);">
            <div class="soft-text text-xs">Weight</div>
            <div class="mono" data-live-weight>-- g</div>
        </div>
        <div class="p-2 border rounded" style="border-color: var(--edge);">
            <div class="soft-text text-xs">Raw ADC</div>
            <div class="mono" data-live-raw>--</div>
        </div>
    </div>

    <div class="flex gap-2">
        <button class="btn-gray flex-1 uppercase" hx-post="/wizard/step/clear_scan" hx-target="#wizard-body" hx-swap="innerHTML">Run Remote Tare</button>
        <button class="btn-outline flex-1 uppercase" hx-get="/wizard/step/add_spool" hx-target="#wizard-body" hx-swap="innerHTML">Skip to Next</button>
    </div>
</div>
