<div class="space-y-4">
    <div class="p-3 border rounded" style="border-color: var(--edge);">
        <div class="font-semibold mb-1">Step 2: Place Spool</div>
        <p class="text-sm soft-text">Place the spool on the scale and wait for the hardening logic to settle.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div class="p-3 border rounded" style="border-color: var(--edge);">
            <div class="text-xs soft-text uppercase">Current Weight</div>
            <div class="text-2xl mono mt-1">{{ "%.2f"|format(weight_grams) if weight_grams is not none else "0.00" }} g</div>
        </div>
        <div class="p-3 border rounded" style="border-color: var(--edge);">
            <div class="text-xs soft-text uppercase">Latest RFID</div>
            <div class="text-sm mono mt-1 break-all">{{ latest_uid or 'Awaiting scan' }}</div>
        </div>
    </div>

    <div class="flex gap-2">
        <button class="btn-outline flex-1 uppercase" hx-get="/wizard/step/clear_scan" hx-target="#wizard-body" hx-swap="innerHTML">Back</button>
        <button class="btn-blue flex-1 uppercase" hx-get="/wizard/step/harden" hx-target="#wizard-body" hx-swap="innerHTML">Start Hardening</button>
    </div>
</div>
