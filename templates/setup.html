<!DOCTYPE html>
<html lang="en">
<head>
    <title>DryDock - Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#FFF;} .in-d{background:#000;border:1px solid #A3A3A1;color:#FFF;padding:.5rem;width:100%;border-radius:.375rem;}</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="border border-[#A3A3A1] p-8 rounded-lg max-w-md w-full bg-[#050505]">
        <h1 class="text-2xl font-bold mb-6 text-[#09395F] text-center uppercase">DryDock Admin Setup</h1>
        <form action="/setup" method="POST" class="space-y-4">
            <div><label class="block text-xs text-[#A3A3A1]">Username</label><input type="text" name="username" class="in-d" required></div>
            <div><label class="block text-xs text-[#A3A3A1]">Password</label><input type="password" name="password" class="in-d" required></div>
            <button type="submit" class="w-full bg-[#09395F] text-white p-2 rounded uppercase font-bold mt-4">Create Account</button>
        </form>
    </div>
</body>
</html>
