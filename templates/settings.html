<div class="card h-fit">
    <h2 class="text-2xl font-bold mb-4 text-[#09395F] border-b border-[#A3A3A1]/30 pb-2">Firmware Builder</h2>
    <p class="text-xs text-[#A3A3A1] mb-4">Generate an Arduino script pre-configured with your network details.</p>
    
    <form action="/build_firmware" method="POST" class="space-y-4">
        <div>
            <label class="block text-xs text-[#A3A3A1] mb-1">Wi-Fi SSID</label>
            <input type="text" name="ssid" class="input-dark" required>
        </div>
        <div>
            <label class="block text-xs text-[#A3A3A1] mb-1">Wi-Fi Password</label>
            <input type="password" name="password" class="input-dark" required>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-[#A3A3A1] mb-1">Pi IP Address</label>
                <input type="text" name="pi_ip" value="192.168.0.169" class="input-dark" required>
            </div>
            <div>
                <label class="block text-xs text-[#A3A3A1] mb-1">Port</label>
                <input type="text" name="pi_port" value="2134" class="input-dark" required>
            </div>
        </div>
        <button type="submit" class="btn-blue w-full uppercase tracking-wider flex justify-center items-center gap-2">
            Download Script
        </button>
    </form>
</div>
