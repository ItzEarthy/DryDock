{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="card h-fit">
        <h2 class="text-2xl font-bold mb-4 text-[#09395F] border-b border-[#A3A3A1]/30 pb-2">Configuration</h2>
        <form hx-post="/settings" hx-target="#settings-result" class="space-y-4">
            <div>
                <label class="block text-xs text-[#A3A3A1] mb-1">Spoolman Base URL</label>
                <input type="url" name="spoolman_url" value="{{ app_settings.spoolman_url }}" class="input-dark" required>
            </div>
            <div>
                <label class="block text-xs text-[#A3A3A1] mb-1">Desiccant Alert Delta Threshold (%)</label>
                <input type="number" step="0.1" name="humidity_threshold" value="{{ app_settings.humidity_threshold }}" class="input-dark" required>
            </div>
            <button type="submit" class="btn-gray w-full uppercase tracking-wider">Save Configuration</button>
        </form>
        <div id="settings-result"></div>
    </div>

    <div id="calibration-card" class="card h-fit">
        {% include 'partials/calibration.html' %}
    </div>
</div>
{% endblock %}
