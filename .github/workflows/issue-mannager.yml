name: Issue Automator

on:
  issues:
    types: [opened, edited]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-label based on keywords
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            // Combine title and body, and make it lowercase for easy searching
            const text = (issue.title + " " + issue.body).toLowerCase();
            const labelsToAdd = [];

            // Define your keyword rules
            if (text.includes('esp32') || text.includes('wiring') || text.includes('sensor')) {
              labelsToAdd.push('hardware');
            }
            if (text.includes('flash') || text.includes('logic') || text.includes('code')) {
              labelsToAdd.push('firmware');
            }
            if (text.includes('flask') || text.includes('api') || text.includes('dashboard')) {
              labelsToAdd.push('api');
            }
            if (text.includes('extruder') || text.includes('ercp') || text.includes('path')) {
              labelsToAdd.push('mechanical');
            }
            if (text.includes('klipper') || text.includes('spoolman') || text.includes('update')) {
              labelsToAdd.push('dependencies');
            }

            // Apply the labels if any matches were found
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labelsToAdd
              });
            }
