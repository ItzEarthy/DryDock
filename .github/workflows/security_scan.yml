name: Security & Code Quality Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    name: Run Scanners
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Python Security Scan (Bandit)
      - name: Install Bandit
        run: pip install bandit
      
      - name: Run Bandit
        # Scans app.py and any other python files, ignores the instance folder
        run: bandit -r . -x ./instance -ll

      # 2. C++ Static Analysis (Cppcheck)
      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run Cppcheck
        # Scans your .ino and .cpp files for memory leaks or logic errors
        run: cppcheck --enable=all --suppress=missingIncludeSystem .

      # 3. Secret Scanning (TruffleHog)
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
