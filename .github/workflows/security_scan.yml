name: Security & Code Quality Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    name: Run Scanners
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Python Security Scan (Bandit)
      - name: Install Bandit
        run: pip install bandit
      
      - name: Run Bandit
        # Scans app.py and any other python files, ignores the instance folder
        run: bandit -r . -x ./instance -ll
